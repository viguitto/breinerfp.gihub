<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora</title>
  <link rel="stylesheet" href="calculador.css" />
</head>
<body>
<nav>

    <ul>
      <li><a href="contacto.html">contacto</a></li>
      <li><a href="inicio.html">inicio</a></li>
      <li><a href="juego.html">juego</a></li>
    </ul>
  </nav>

  <div class="calculator">
    <div class="display" id="display">0</div>
    <div class="buttons">
      <button class="btn ac" data-op="AC">AC</button>
      <button class="btn op" data-op="()">( )</button>
      <button class="btn op" data-op="%">%</button>
      <button class="btn op" data-op="÷">÷</button>
      <button class="btn num" data-op="7">7</button>
      <button class="btn num" data-op="8">8</button>
      <button class="btn num" data-op="9">9</button>
      <button class="btn op" data-op="×">×</button>
      <button class="btn num" data-op="4">4</button>
      <button class="btn num" data-op="5">5</button>
      <button class="btn num" data-op="6">6</button>
      <button class="btn op" data-op="-">−</button>
      <button class="btn num" data-op="1">1</button>
      <button class="btn num" data-op="2">2</button>
      <button class="btn num" data-op="3">3</button>
      <button class="btn op" data-op="+">+</button>
      <button class="btn num" data-op="0">0</button>
      <button class="btn num" data-op=".">.</button>
      <button class="btn del" data-op="⌫">⌫</button>
      <button class="btn eq" data-op="=">=</button>
    </div>
  </div>

  <script src="calculador.js"></script>
</body>
</html>
